<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mono Match</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #fff;
    }

    .tagline {
      font-size: 0.95rem;
      color: #aaa;
      text-align: center;
      margin-top: 0.25rem;
      line-height: 1.5;
    }

    .screen { display: none; flex-direction: column; align-items: center; gap: 1.25rem; width: 100%; max-width: 520px; }
    .screen.active { display: flex; }

    /* тФАтФА MENU тФАтФА */
    .diff-grid { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
    .diff-btn {
      padding: 12px 24px;
      border-radius: 12px;
      border: 2px solid #333;
      background: #16213e;
      color: #ccc;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
      min-width: 90px;
    }
    .diff-btn:hover { border-color: #666; color: #fff; }
    .diff-btn.selected { border-color: #e85d3a; background: #2a1a14; color: #e85d3a; }
    .diff-btn small { display: block; font-size: 0.75rem; margin-top: 2px; color: inherit; opacity: 0.7; }

    .play-btn {
      padding: 14px 40px;
      border-radius: 12px;
      background: #e85d3a;
      color: white;
      border: none;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .play-btn:hover { opacity: 0.9; transform: scale(1.02); }
    .play-btn:active { transform: scale(0.98); }

    /* тФАтФА HUD тФАтФА */
    .hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }

    .hud-pill {
      background: #16213e;
      border: 1px solid #333;
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 0.85rem;
      color: #aaa;
    }
    .hud-pill span { font-weight: 600; color: #fff; }

    .timer-wrap { position: relative; width: 64px; height: 64px; }
    .timer-wrap svg { transform: rotate(-90deg); }
    .timer-num {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.95rem;
      font-weight: 600;
      color: #fff;
    }

    /* тФАтФА CARDS тФАтФА */
    .cards-row {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .card-wrap { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .card-label { font-size: 0.75rem; color: #666; }

    .card {
      width: 210px;
      height: 210px;
      border-radius: 50%;
      border: 3px solid #333;
      background: #16213e;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    .item {
      position: absolute;
      transform: translate(-50%, -50%);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      transition: transform 0.1s;
      line-height: 1;
    }
    .item:hover { filter: brightness(1.3); }

    /* тФАтФА FEEDBACK тФАтФА */
    .hint {
      font-size: 0.85rem;
      color: #888;
      min-height: 1.2em;
      text-align: center;
    }

    .flash-overlay {
      position: fixed;
      inset: 0;
      background: rgba(80, 220, 100, 0.15);
      pointer-events: none;
      animation: flashfade 0.4s ease forwards;
      z-index: 999;
    }
    @keyframes flashfade { from { opacity: 1; } to { opacity: 0; } }

    @keyframes pop {
      0%   { transform: translate(-50%,-50%) scale(1); }
      40%  { transform: translate(-50%,-50%) scale(1.7); }
      100% { transform: translate(-50%,-50%) scale(0); opacity: 0; }
    }
    .item.correct { animation: pop 0.35s ease forwards; pointer-events: none; }

    @keyframes wobble {
      0%,100% { transform: translate(-50%,-50%) rotate(0deg); }
      25%      { transform: translate(-50%,-50%) rotate(-12deg); }
      75%      { transform: translate(-50%,-50%) rotate(12deg); }
    }
    .item.wrong { animation: wobble 0.3s ease; }

    /* тФАтФА BETWEEN ROUNDS тФАтФА */
    .round-result { font-size: 1.1rem; text-align: center; line-height: 1.6; }
    .round-result strong { font-size: 1.5rem; color: #e85d3a; }

    /* тФАтФА RESULTS тФАтФА */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      width: 100%;
    }

    .stat-card {
      background: #16213e;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 1rem;
      text-align: center;
    }
    .stat-label { font-size: 0.75rem; color: #888; margin-bottom: 4px; }
    .stat-val { font-size: 1.6rem; font-weight: 600; color: #fff; }
    .stat-val.highlight { color: #e85d3a; }

    .comment {
      font-size: 0.9rem;
      color: #aaa;
      text-align: center;
      line-height: 1.5;
    }

    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }

    .ghost-btn {
      padding: 10px 24px;
      border-radius: 10px;
      background: transparent;
      border: 1px solid #444;
      color: #ccc;
      font-size: 0.9rem;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .ghost-btn:hover { border-color: #888; color: #fff; }

    /* тФАтФА RESPONSIVE тФАтФА */
    @media (max-width: 480px) {
      .card { width: 160px; height: 160px; }
      h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

<!-- MENU -->
<div id="menu" class="screen active">
  <h1>ЁЯФ╡ Mono Match</h1>
  <p class="tagline">Two cards. One match. Find it fast.</p>

  <p style="font-size:0.8rem; color:#666; margin-bottom:-0.5rem;">Choose difficulty</p>
  <div class="diff-grid">
    <button class="diff-btn" onclick="selectDiff(3)">Easy<small>3 symbols</small></button>
    <button class="diff-btn selected" onclick="selectDiff(5)">Medium<small>5 symbols</small></button>
    <button class="diff-btn" onclick="selectDiff(8)">Hard<small>8 symbols</small></button>
  </div>

  <button class="play-btn" onclick="startGame()">Play 5 rounds тЖТ</button>
  <p style="font-size:0.75rem; color:#555;">Tap the symbol that appears on both cards</p>
</div>

<!-- PLAY -->
<div id="play" class="screen">
  <div class="hud">
    <div class="hud-pill">Round <span id="round-num">1</span> / 5</div>
    <div class="timer-wrap">
      <svg width="64" height="64" viewBox="0 0 64 64">
        <circle cx="32" cy="32" r="26" fill="none" stroke="#333" stroke-width="4"/>
        <circle id="timer-arc" cx="32" cy="32" r="26" fill="none" stroke="#e85d3a"
          stroke-width="4" stroke-dasharray="163.4" stroke-dashoffset="0"
          stroke-linecap="round"/>
      </svg>
      <div class="timer-num" id="timer-num">тАФ</div>
    </div>
    <div class="hud-pill">Best <span id="best-disp">тАФ</span></div>
  </div>

  <div class="cards-row">
    <div class="card-wrap">
      <div class="card" id="card-a"></div>
      <div class="card-label">Card 1</div>
    </div>
    <div class="card-wrap">
      <div class="card" id="card-b"></div>
      <div class="card-label">Card 2</div>
    </div>
  </div>

  <p class="hint" id="play-hint">Find the matching symbol!</p>
</div>

<!-- BETWEEN ROUNDS -->
<div id="between" class="screen">
  <div class="round-result" id="round-result"></div>
  <p class="hint">Next round coming upтАж</p>
</div>

<!-- RESULTS -->
<div id="results" class="screen">
  <h1 style="font-size:1.5rem;">Game over!</h1>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-label">Total time</div><div class="stat-val highlight" id="r-total">тАФ</div></div>
    <div class="stat-card"><div class="stat-label">Average / round</div><div class="stat-val" id="r-avg">тАФ</div></div>
    <div class="stat-card"><div class="stat-label">Quickest round</div><div class="stat-val" id="r-best">тАФ</div></div>
    <div class="stat-card"><div class="stat-label">Slowest round</div><div class="stat-val" id="r-worst">тАФ</div></div>
  </div>
  <p class="comment" id="r-comment"></p>
  <div class="btn-row">
    <button class="ghost-btn" onclick="showScreen('menu')">Change difficulty</button>
    <button class="play-btn" onclick="startGame()">Play again тЖТ</button>
  </div>
</div>

<script>
  const SYMBOLS = [
    'ЁЯНО','ЁЯНК','ЁЯНЛ','ЁЯНЗ','ЁЯНУ','ЁЯеЭ','ЁЯНТ','ЁЯлР','ЁЯНЙ','ЁЯНС','ЁЯен','ЁЯНН',
    'ЁЯжК','ЁЯР╕','ЁЯРз','ЁЯжЛ','ЁЯРЩ','ЁЯжД','ЁЯР│','ЁЯжБ','ЁЯРЭ','ЁЯжА','ЁЯжй','ЁЯРв',
    'тнР','ЁЯМЩ','тШАя╕П','ЁЯМИ','тЭДя╕П','ЁЯФе','ЁЯТО','ЁЯОп','ЁЯО╕','ЁЯОи','ЁЯОк','ЁЯЪА',
    'ЁЯМ╕','ЁЯНД','ЁЯМ╡','ЁЯжЦ','ЁЯОГ','ЁЯС╛','ЁЯз▓','ЁЯкР','ЁЯО▓','ЁЯзй','ЁЯкД','ЁЯПЖ'
  ];

  let difficulty = 5;
  let roundTimes = [];
  let currentRound = 0;
  let roundStart = 0;
  let timerInterval = null;
  const TOTAL_ROUNDS = 5;
  const MAX_SECS = 15;

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function selectDiff(n) {
    difficulty = n;
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('selected'));
    event.currentTarget.classList.add('selected');
  }

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function startGame() {
    roundTimes = [];
    currentRound = 0;
    document.getElementById('best-disp').textContent = 'тАФ';
    showScreen('play');
    nextRound();
  }

  function nextRound() {
    currentRound++;
    document.getElementById('round-num').textContent = currentRound;
    document.getElementById('play-hint').textContent = 'Find the matching symbol!';

    const pool = shuffle(SYMBOLS);
    const match = pool[0];
    const othersA = pool.slice(1, difficulty);
    const othersB = pool.slice(difficulty, difficulty * 2 - 1);
    const setA = shuffle([match, ...othersA]);
    const setB = shuffle([match, ...othersB]);

    buildCard('card-a', setA, match);
    buildCard('card-b', setB, match);

    roundStart = performance.now();
    startTimer();
  }

  function buildCard(cardId, symbols, matchSym) {
    const card = document.getElementById(cardId);
    card.innerHTML = '';
    const R = 78, cx = 105, cy = 105;
    const placed = [];

    symbols.forEach(sym => {
      const pos = findPosition(placed, cx, cy, R);
      placed.push(pos);

      const el = document.createElement('div');
      el.className = 'item';
      el.textContent = sym;
      el.style.left = pos.x + 'px';
      el.style.top = pos.y + 'px';
      const size = 14 + Math.random() * 10;
      const rot = (Math.random() - 0.5) * 50;
      el.style.fontSize = size + 'px';
      el.style.transform = `translate(-50%, -50%) rotate(${rot}deg)`;

      if (sym === matchSym) {
        el.addEventListener('click', () => onMatch(el));
      } else {
        el.addEventListener('click', () => onWrong(el));
      }
      card.appendChild(el);
    });
  }

  function findPosition(placed, cx, cy, R) {
    for (let attempt = 0; attempt < 40; attempt++) {
      const angle = Math.random() * Math.PI * 2;
      const r = 18 + Math.random() * (R - 18);
      const x = cx + r * Math.cos(angle);
      const y = cy + r * Math.sin(angle);
      if (placed.every(p => Math.hypot(p.x - x, p.y - y) > 40)) {
        return { x, y };
      }
    }
    const angle = Math.random() * Math.PI * 2;
    return { x: cx + 40 * Math.cos(angle), y: cy + 40 * Math.sin(angle) };
  }

  function startTimer() {
    clearInterval(timerInterval);
    const arc = document.getElementById('timer-arc');
    const num = document.getElementById('timer-num');
    const circumference = 163.4;

    timerInterval = setInterval(() => {
      const elapsed = (performance.now() - roundStart) / 1000;
      num.textContent = elapsed.toFixed(1) + 's';
      const frac = Math.min(elapsed / MAX_SECS, 1);
      arc.style.strokeDashoffset = frac * circumference;
    }, 50);
  }

  function onMatch(el) {
    clearInterval(timerInterval);
    const elapsed = (performance.now() - roundStart) / 1000;
    roundTimes.push(elapsed);
    el.classList.add('correct');

    const flash = document.createElement('div');
    flash.className = 'flash-overlay';
    document.body.appendChild(flash);
    setTimeout(() => flash.remove(), 400);

    const best = Math.min(...roundTimes);
    document.getElementById('best-disp').textContent = best.toFixed(2) + 's';

    if (currentRound >= TOTAL_ROUNDS) {
      setTimeout(showResults, 500);
    } else {
      const rating = elapsed < 1.5 ? 'тЪб Lightning!' : elapsed < 3 ? 'тЬЕ Nice one!' : elapsed < 6 ? 'ЁЯСН Good find!' : 'ЁЯРв Keep at it!';
      document.getElementById('round-result').innerHTML =
        `<strong>${elapsed.toFixed(2)}s</strong><br>${rating}`;
      showScreen('between');
      setTimeout(() => { showScreen('play'); nextRound(); }, 1400);
    }
  }

  function onWrong(el) {
    el.classList.remove('wrong');
    void el.offsetWidth;
    el.classList.add('wrong');
    el.style.opacity = '0.4';
    setTimeout(() => { el.style.opacity = '1'; el.classList.remove('wrong'); }, 350);
    document.getElementById('play-hint').textContent = 'Not that one тАФ keep looking!';
  }

  function showResults() {
    showScreen('results');
    const total = roundTimes.reduce((a, b) => a + b, 0);
    const avg = total / roundTimes.length;
    const best = Math.min(...roundTimes);
    const worst = Math.max(...roundTimes);

    document.getElementById('r-total').textContent = total.toFixed(2) + 's';
    document.getElementById('r-avg').textContent = avg.toFixed(2) + 's';
    document.getElementById('r-best').textContent = best.toFixed(2) + 's';
    document.getElementById('r-worst').textContent = worst.toFixed(2) + 's';

    let comment = '';
    if (avg < 1.5) comment = 'ЁЯПЖ Exceptional тАФ elite pattern recognition!';
    else if (avg < 2.5) comment = 'тЪб Very quick тАФ well above average!';
    else if (avg < 4) comment = 'тЬЕ Solid! Keep playing to improve.';
    else comment = 'ЁЯОо Just getting started тАФ you\'ll speed up fast!';
    document.getElementById('r-comment').textContent = comment;
  }
</script>
</body>
</html>
